<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EspaçoLivre — Simplificado</title>
  <link rel="stylesheet" href="/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

  <nav>
    <div class="logo">EspaçoLivre</div>
    <div class="nav-links" id="nav-auth-container">
      <button class="btn btn-gold" onclick="abrirModal('authModal')">Entrar</button>
    </div>
  </nav>

  <main class="container">
    <div class="hero">
      <h1>Encontre o espaço perfeito</h1>
      <p>Salas, galpões e auditórios para sua necessidade.</p>
    </div>

    <div class="cards-grid" id="lista-espacos">
      </div>
  </main>

  <!-- Modal Unificado de Autenticação (Login / Cadastro) -->
  <div class="modal-overlay" id="authModal">
    <div class="modal">
      <button class="modal-close" onclick="fecharModal('authModal')">×</button>
      
      <!-- Seção de Login -->
      <div id="auth-login-section">
        <h2>Entrar</h2>
        <form id="form-login" onsubmit="event.preventDefault(); processarLogin();">
          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" required placeholder="seu@email.com">
          </div>
          <div class="form-group">
            <label for="login-senha">Senha</label>
            <div class="password-wrapper">
              <input type="password" id="login-senha" required placeholder="••••••••">
              <button type="button" class="btn-toggle-password" onclick="togglePassword('login-senha', this)">
                <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                <svg class="eye-closed" style="display: none;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
              </button>
            </div>
          </div>
          <button type="submit" class="btn btn-gold w-100">Entrar</button>
        </form>
        <p class="auth-toggle-text">Não tem uma conta? <a href="#" onclick="alternarFormAuth('cadastro')">Cadastre-se</a></p>
      </div>

      <!-- Seção de Cadastro -->
      <div id="auth-cadastro-section" style="display: none;">
        <h2>Criar Conta</h2>
        <form id="form-cadastro" onsubmit="event.preventDefault(); processarCadastro();">
          <div class="form-group">
            <label for="cadastro-nome">Nome Completo</label>
            <input type="text" id="cadastro-nome" required placeholder="Seu nome">
          </div>
          <div class="form-group">
            <label for="cadastro-email">Email</label>
            <input type="email" id="cadastro-email" required placeholder="seu@email.com">
          </div>
          <div class="form-group">
            <label for="cadastro-senha">Senha</label>
            <div class="password-wrapper">
              <input type="password" id="cadastro-senha" required placeholder="Mínimo 6 caracteres">
              <button type="button" class="btn-toggle-password" onclick="togglePassword('cadastro-senha', this)">
                <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                <svg class="eye-closed" style="display: none;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
              </button>
            </div>
          </div>
          <div class="form-group">
            <label for="cadastro-confirmar-senha">Confirmar Senha</label>
            <div class="password-wrapper">
              <input type="password" id="cadastro-confirmar-senha" required placeholder="Repita a senha">
              <button type="button" class="btn-toggle-password" onclick="togglePassword('cadastro-confirmar-senha', this)">
                <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                <svg class="eye-closed" style="display: none;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
              </button>
            </div>
          </div>
          <button type="submit" class="btn btn-gold w-100">Cadastrar</button>
        </form>
        <p class="auth-toggle-text">Já tem uma conta? <a href="#" onclick="alternarFormAuth('login')">Entre</a></p>
      </div>
    </div>
  </div>

  <!-- Modal de Confirmação de Reserva -->
  <div class="modal-overlay" id="reservaModal">
    <div class="modal">
      <button class="modal-close" onclick="fecharModal('reservaModal')">×</button>
      <h2>Confirmar Aluguel</h2>
      <div id="reserva-espaco-info" style="margin: 15px 0; padding: 15px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);">
        <!-- Injetado dinamicamente -->
      </div>
      <form id="form-reserva" onsubmit="event.preventDefault(); processarReserva();">
        <input type="hidden" id="reserva-espaco-id">
        <div class="form-group">
          <label for="reserva-data">Data da Reserva</label>
          <input type="date" id="reserva-data" required>
        </div>
        <div class="form-group">
          <label for="reserva-periodo">Período / Detalhes (Opcional)</label>
          <input type="text" id="reserva-periodo" placeholder="Ex: Turno da manhã, ou horário comercial">
        </div>
        <button type="submit" class="btn btn-gold w-100">Confirmar e Reservar</button>
      </form>
    </div>
  </div>

  <!-- Modal de Minhas Reservas -->
  <div class="modal-overlay" id="minhasReservasModal">
    <div class="modal" style="max-width: 500px;">
      <button class="modal-close" onclick="fecharModal('minhasReservasModal')">×</button>
      <h2>Minhas Reservas</h2>
      <div id="lista-reservas-usuario" style="margin-top: 20px; max-height: 350px; overflow-y: auto;">
        <!-- Lista de reservas inserida dinamicamente -->
      </div>
    </div>
  </div>

  <!-- Container de Notificações (Toast) -->
  <div id="toast-container" class="toast-container"></div>
  <script src="script.js"></script>
</body>
</html>
